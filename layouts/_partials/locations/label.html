{{ if . }}
    {{ $locationId := . }}
    {{ range hugo.Sites }}
        {{ range (where .Pages "Section" "locations") }}
            {{ if eq .Params.id $locationId }}
                {{ .LinkTitle -}}
                {{ range .Params.locations -}}
                    , {{ . -}}
                {{ end }}
            {{ end }}
        {{ end }}
    {{ end }}
{{ end }}
