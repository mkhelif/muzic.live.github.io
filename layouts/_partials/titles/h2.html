{{- $title := . -}}
{{- $link := "" -}}
{{- if reflect.IsMap . -}}
    {{- $title = .title -}}
    {{- $link = .link -}}
{{- end -}}
<h2 class="d-flex align-items-center gap-3 text-white text-uppercase mb-0">
    <span class="d-inline-block bg-primary flex-shrink-0" style="width:14px; height:14px;"></span>
    {{ if $link }}<a class="text-reset text-decoration-none" href="{{ $link }}">{{ $title }}</a>{{ else }}{{ $title }}{{ end }}
</h2>
