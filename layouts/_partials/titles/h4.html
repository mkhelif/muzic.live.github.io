<div class="d-flex justify-content-between align-items-end pb-3 mb-3 border-bottom border-1 border-primary">
    <h2 class="d-flex align-items-center gap-3 text-white text-uppercase">
        <span class="d-inline-block bg-primary flex-shrink-0" style="width:10px; height:10px;"></span>
        {{ .title }}
    </h2>
    {{ if .link }}
        <a class="text-uppercase text-primary small fw-bolder" href="{{ .link }}">
            Tout voir
            <i class="fa fa-xs fa-chevron-right"></i>
        </a>
    {{ else }}
        {{ .title }}
    {{ end }}
</div>
