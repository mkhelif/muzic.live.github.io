<div class="d-flex justify-content-between align-items-end pb-3 mb-3 border-bottom border-1 border-primary">
    <h1 class="d-flex align-items-center gap-3 text-white text-uppercase">
        <span class="d-inline-block bg-primary flex-shrink-0" style="width:18px; height:18px;"></span>
        {{ .title }}
    </h1>
    {{ if .link }}
    <a class="text-uppercase text-primary small fw-bolder" href="{{ .link }}">
        {{ default "Tout voir" .linkText }}
        <i class="fa {{ default "fa-chevron-right fa-xs" .linkIcon }}"></i>
    </a>
    {{ end }}
</div>
