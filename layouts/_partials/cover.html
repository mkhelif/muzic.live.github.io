{{ $cover := .Resources.Get .Params.cover }}
{{ if $cover }}
    <div class="cover position-relative d-flex flex-column align-content-end mb-4" style="background-image: url({{ $cover.Permalink | safeURL }});">
        <div data-pagefind-meta="image[data-src], image_alt[data-alt]"
             data-src="{{ $cover.Permalink }}"
             data-alt="{{ .Title }}"
             class="backdrop-blur position-absolute w-100 h-100"
        ></div>

        <div class="flex-grow-1"></div>
        <div class="container z-1 p-0 position-relative d-flex align-items-center">
            <div class="position-absolute bottom-0 bg-dark w-100 h-100 opacity-25 rounded-top-1"></div>
            <h1 class="position-relative m-0 px-4 py-3 text-primary flex-grow-1"
                data-pagefind-meta="title"
            >
                {{ .Title }}
            </h1>
            <p class="position-relative fs-4 mb-0 me-4">
                {{ partial "social/links.html" . }}
            </p>
        </div>
    </div>
{{ else }}
    <div data-pagefind-meta="image[data-src], image_alt[data-alt]"
         data-src="/cover-empty.jpg"
         data-alt="{{ .Title }}"
         class="d-none"
    ></div>

    <div class="container mb-4">
        <div class="mb-0 p-3 d-flex align-items-center border-bottom border-primary border-4">
            <h1 class="m-0 px-2 py-1 flex-grow-1"
                data-pagefind-meta="title"
            >
                {{ .Title }}
            </h1>
            <p class="fs-4 mb-0">
                {{ partial "social/links.html" . }}
            </p>
        </div>
    </div>
{{ end }}
