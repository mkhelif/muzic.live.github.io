{{- $author := . }}
{{- with resources.Get "authors.json" | transform.Unmarshal -}}
    <p class="small text-center text-muted mt-2 mb-4 d-print-none">
        {{ with index . $author }}
            <small>&copy; Photos / <a href="{{ .link }}" target="_blank">{{ .name }}</a></small>
        {{ end }}
    </p>
{{- end -}}
