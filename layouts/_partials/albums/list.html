<div data-pagefind-ignore="all">
    <div class="mt-5 mb-4">{{ partial "titles/h2.html" (dict "title" "Critiques d'albums") }}</div>
    {{ range $index, $album := .albums }}
        {{ partial "albums/list-entry.html" (dict "album" $album "index" $index) }}
    {{ end }}
    {{ if eq .albums.Len 0 }}
        <p class="small text-muted text-center">Aucune critique d'album</p>
    {{ end }}
</div>
