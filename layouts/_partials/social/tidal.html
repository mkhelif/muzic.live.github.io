{{ if .Params.socials.tidal }}
    {{ if eq .Section "artists" }}
        <a class="me-2 align-middle" href="https://tidal.com/artist/{{ .Params.socials.tidal }}" target="_blank" rel="noreferrer noopener"><i class="fab fa-tidal"></i></a>
    {{ else if eq .Section "albums" }}
        <a class="me-2 align-middle" href="https://tidal.com/album/{{ .Params.socials.tidal }}" target="_blank" rel="noreferrer noopener"><i class="fab fa-tidal"></i></a>
    {{ end }}
{{ end }}
