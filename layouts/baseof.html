<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}">
    <head>
        {{ partial "head.html" . }}
    </head>
    <body>
        <!-- Google Tag Manager (noscript) -->
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{ .Site.Config.Services.GoogleAnalytics.ID }}" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
        <!-- End Google Tag Manager (noscript) -->

        <div class="d-flex flex-column h-100">
            <header class="d-print-none">
                {{ partial "header.html" . }}
            </header>
            <main class="flex-grow-1" data-pagefind-body>
                {{ block "main" . }}{{ end }}

                {{ partialCached "advertisements/seetickets.html" . }}
            </main>
            <footer class="d-print-none">
                {{ partialCached "footer.html" . }}
            </footer>
        </div>

        {{ partialCached "search-results.html" . }}
    </body>
</html>
